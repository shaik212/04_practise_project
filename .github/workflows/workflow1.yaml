name: build and test
on: push
jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v6
      - name: install nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: install dependencies
        run: npm install
      - name: running lint
        run: npm run lint
      - name: test
        run: npm run test
      - name: build
        run: npm run build
      - name: deploy
        run: echo " deployed " 